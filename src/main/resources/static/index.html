<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReMate | 메인</title>
    <style>
        :root { --kakao-color: #FEE500; --google-color: #4285F4; --primary-bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: var(--primary-bg); }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 400px; width: 90%; }
        .btn { display: block; padding: 14px; margin: 10px 0; border-radius: 12px; text-decoration: none; font-weight: bold; transition: 0.2s; border: none; cursor: pointer; width: 100%; font-size: 1rem; }
        .btn-google { background: var(--google-color); color: white; }
        .btn-kakao { background: var(--kakao-color); color: #3c1e1e; }
        .btn-main { background: #1e293b; color: white; }
        .btn-admin { background: #ef4444; color: white; }
        .btn-sub { background: #64748b; color: white; }
        .hidden { display: none; }
        #user-info { margin-bottom: 25px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; margin-top: 8px; font-weight: bold; }
        .badge-admin { background: #fee2e2; color: #ef4444; }
        .badge-member { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>
<div class="container">
    <h1>🧾 ReMate</h1>

    <div id="before-login">
        <p>소셜 계정으로 시작하세요</p>
        <a href="/oauth2/authorization/google" class="btn btn-google">Google 로그인</a>
        <a href="/oauth2/authorization/kakao" class="btn btn-kakao">Kakao 로그인</a>
    </div>

    <div id="after-login" class="hidden">
        <div id="user-info">
            <p>👋 <strong id="user-nickname">사용자</strong>님</p>
            <div id="role-badge" class="badge"></div>
        </div>

        <button id="main-nav-btn" class="btn btn-main">📸 영수증 관리</button>

        <button id="admin-nav-btn" class="btn btn-admin hidden">⚖️ 멤버십 승인 대기</button>

        <button onclick="location.href='/select-workspace.html'" class="btn btn-sub">⚙️ 워크스페이스 관리</button>

        <a href="/" onclick="localStorage.clear()" style="display:block; margin-top:20px; color:#94a3b8; font-size:0.85rem; text-decoration: none;">로그아웃</a>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (token) {
        localStorage.setItem('accessToken', token);
        window.history.replaceState({}, document.title, "/");
    }

    const storedToken = localStorage.getItem('accessToken');
    if (storedToken) {
        checkAuthStatus(storedToken);
    } else {
        document.getElementById('before-login').classList.remove('hidden');
    }

    async function checkAuthStatus(token) {
        try {
            const res = await fetch('/api/auth/status', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();

            if (data.authenticated) {
                // [수정 포인트] 서버 응답의 모든 필드를 명확히 저장
                localStorage.setItem('accessToken', token);
                localStorage.setItem('currentWorkspaceId', data.workspaceId || '');
                localStorage.setItem('userRole', data.role || '');
                localStorage.setItem('userName', data.userName || '');

                // 유저 PK 저장 (AuthStatusResponse에 userId 필드가 있어야 함)
                // 만약 userId 필드가 없다면 data.email 등 고유값이라도 임시 저장
                localStorage.setItem('currentUserId', data.userId || '');

                console.log("✅ 인증 정보 로드 완료:", data);
                console.log("✅ 인증 정보 로드 완료. 현재 역할:", data.role);

                document.getElementById('before-login').classList.add('hidden');
                document.getElementById('after-login').classList.remove('hidden');
                document.getElementById('user-nickname').innerText = data.userName;

                const badgeEl = document.getElementById('role-badge');
                if (data.role === 'ADMIN') {
                    badgeEl.innerText = '관리자';
                    badgeEl.className = 'badge badge-admin';
                    //document.getElementById('admin-nav-btn').classList.remove('hidden');
                } else if (data.role === 'MEMBER') {
                    badgeEl.innerText = '멤버';
                    badgeEl.className = 'badge badge-member';
                    document.getElementById('admin-nav-btn').classList.add('hidden');
                }

                const mainBtn = document.getElementById('main-nav-btn');
                if (data.workspaceId) {
                    mainBtn.onclick = () => location.href = '/upload.html';
                } else {
                    mainBtn.onclick = () => {
                        alert('참여 중인 워크스페이스가 없습니다. 설정 페이지로 이동합니다.');
                        location.href = '/select-workspace.html';
                    };
                }
            } else {
                localStorage.clear();
                document.getElementById('before-login').classList.remove('hidden');
            }
        } catch (e) {
            console.error("인증 확인 실패:", e);
            document.getElementById('before-login').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
