<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Receipt Master | 분석 및 관리</title>
    <style>
        :root { --primary:#3b82f6; --bg:#f8fafc; --card:#ffffff; --text:#1e293b; }
        body{ font-family:'Pretendard',sans-serif; background:var(--bg); margin:0; padding:40px 20px; display:flex; flex-direction:column; align-items:center; color:var(--text); }
        .card{ background:var(--card); padding:32px; border-radius:24px; box-shadow:0 10px 25px rgba(0,0,0,0.05); width:100%; max-width:980px; margin-bottom:24px; }
        h2,h3{ margin-top:0; font-weight:700; letter-spacing:-0.5px; }

        .upload-zone{ border:2px dashed #e2e8f0; padding:40px; border-radius:16px; margin-bottom:16px; transition:.3s; cursor:pointer; text-align:center; }
        .upload-zone:hover{ border-color:var(--primary); background:#f0f7ff; }

        .thumbs{ display:none; grid-template-columns:repeat(auto-fill, minmax(72px, 1fr)); gap:10px; margin: 10px 0 18px; }
        .thumb{ width:72px; height:72px; border-radius:12px; object-fit:cover; border:1px solid #e2e8f0; }

        .progress-container{ width:100%; background:#e2e8f0; border-radius:100px; height:8px; margin:18px 0 14px; display:none; overflow:hidden; }
        .progress-bar{ width:0%; height:100%; background:var(--primary); transition:.3s; }

        .btn-main{ background:#1e293b; color:#fff; padding:14px 28px; border:none; border-radius:12px; cursor:pointer; font-weight:600; width:100%; font-size:1rem; }

        table{ width:100%; border-collapse:separate; border-spacing:0; margin-top:18px; }
        th{ background:#f8fafc; padding:16px; font-weight:600; font-size:.85rem; color:#64748b; border-bottom:2px solid #e2e8f0; text-align:center; }
        td{ padding:16px; text-align:center; border-bottom:1px solid #f1f5f9; font-size:.95rem; vertical-align:middle; }
        tr:hover{ background:#fbfcfe; }

        .status-badge{ padding:5px 12px; border-radius:8px; font-weight:700; font-size:.72rem; display:inline-block; position: relative; cursor: help; }
        .ANALYZING, .WAITING, .UPLOADED { background:#fff7ed; color:#c2410c; }
        .APPROVED { background:#f0fdf4; color:#15803d; }
        .REJECTED { background:#fef2f2; color:#b91c1c; }
        .NEED_MANUAL { background:#f1f5f9; color:#475569; }

        /* 툴팁 스타일 */
        .status-badge[data-reason]::after {
            content: attr(data-reason);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: #1e293b;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            white-space: nowrap;
            max-width: 250px;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 100;
            font-weight: 500;
        }

        .status-badge[data-reason]::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-2px);
            border: 6px solid transparent;
            border-top-color: #1e293b;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 100;
        }

        .status-badge[data-reason]:hover::after,
        .status-badge[data-reason]:hover::before {
            opacity: 1;
        }

        .action-btn{ padding:8px 14px; border-radius:10px; border:1px solid #e2e8f0; cursor:pointer; background:#fff; font-size:.82rem; font-weight:600; margin:0 2px; transition:.2s; }
        .action-btn:hover:not([disabled]){ background:#f8fafc; border-color:#cbd5e1; }
        .action-btn[disabled] { opacity: 0.35; cursor: not-allowed; }

        .modal { display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); }
        .modal-content { background:#fff; margin:5% auto; padding:32px; border-radius:24px; width:90%; max-width:620px; box-shadow:0 20px 40px rgba(0,0,0,0.2); max-height: 85vh; overflow-y: auto; }

        .receipt-preview { margin: 16px 0; text-align: center; }
        .receipt-preview img { max-width: 100%; max-height: 400px; border-radius: 12px; border: 2px solid #e2e8f0; }
        .receipt-preview-placeholder { padding: 60px 20px; background: #f8fafc; border-radius: 12px; color: #94a3b8; border: 2px dashed #e2e8f0; }

        .history-item { border-bottom:1px solid #f1f5f9; padding:16px 0; font-size:0.9rem; }
        .history-item:last-child { border-bottom: none; }
        .history-reason { margin-top:10px; padding:12px; background:#f8fafc; border-radius:10px; border-left:4px solid var(--primary); font-size:0.85rem; color:#475569; line-height:1.5; }
        .history-empty { text-align: center; padding: 40px 20px; color: #94a3b8; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; color: #64748b; margin-bottom: 6px; font-weight: 600; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body>

<div class="card">
    <h2>📸 영수증 업로드</h2>
    <div class="upload-zone" id="dropZone">
        <p style="margin:0; color:#64748b;">파일을 클릭하거나 여기로 드래그하세요</p>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none" />
    </div>
    <div class="thumbs" id="thumbs"></div>
    <div class="progress-container" id="progCont"><div class="progress-bar" id="progBar"></div></div>
    <button id="uploadBtn" class="btn-main">AI 분석 시작하기</button>
    <p id="status" style="margin-top:15px; font-size:.9rem; color:#64748b; text-align:center;"></p>
</div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>📋 분석된 영수증 내역</h3>
        <div>
            <button id="refreshBtn" class="action-btn">🔄 새로고침</button>
            <button onclick="location.href='/api/receipts/export'" class="action-btn" style="background:#1e293b; color:white">📥 CSV 저장</button>
        </div>
    </div>
    <table>
        <thead>
        <tr><th>ID</th><th style="text-align:left">상호명</th><th>결제일시</th><th>금액</th><th>상태</th><th>관리</th></tr>
        </thead>
        <tbody id="receiptList"></tbody>
    </table>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>✏️ 영수증 정보 수정</h3>
        <input type="hidden" id="editId">

        <div class="receipt-preview" id="receiptPreview">
            <div class="receipt-preview-placeholder">영수증 이미지를 불러오는 중...</div>
        </div>

        <div class="form-group">
            <label>상호명</label>
            <input type="text" id="editStoreName">
        </div>

        <div class="form-group">
            <label>금액 (원)</label>
            <input type="number" id="editAmount">
        </div>

        <button id="saveEditBtn" class="btn-main" style="margin-top:8px;">저장하기</button>
        <button id="closeEditBtn" style="width:100%; background:none; border:none; color:#94a3b8; margin-top:10px; cursor:pointer; font-weight: 600;">닫기</button>
    </div>
</div>

<div id="historyModal" class="modal">
    <div class="modal-content">
        <h3>📜 변경 이력 및 사유</h3>
        <div id="historyContent" style="max-height:400px; overflow-y:auto; margin:16px 0;"></div>
        <button id="closeHistoryBtn" class="btn-main">확인</button>
    </div>
</div>

<script>
    let receiptData = [];
    const el = (id) => document.getElementById(id);
    const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

    function closeModal(id) { el(id).style.display = 'none'; }
    function openModal(id) { el(id).style.display = 'block'; }

    async function fetchReceipts() {
        try {
            const res = await fetch('/api/receipts');
            receiptData = await res.json();
            const html = receiptData.map(r => {
                const isProcessable = (r.status === 'WAITING' || r.status === 'NEED_MANUAL');
                const dis = isProcessable ? '' : 'disabled';
                const tradeAt = r.tradeAt ? r.tradeAt.replace('T', ' ').substring(0, 16) : '-';


                const reasonAttr = (r.status === 'REJECTED' && r.rejectionReason)
                    ? `data-reason="${escapeHtml(r.rejectionReason)}"`
                    : '';

                return `
          <tr>
            <td>${r.id}</td>
            <td style="text-align:left"><strong>${escapeHtml(r.storeName)}</strong></td>
            <td>${escapeHtml(tradeAt)}</td>
            <td style="font-weight:700">${(r.totalAmount || 0).toLocaleString()}원</td>
            <td><span class="status-badge ${r.status}" ${reasonAttr}>${r.status}</span></td>
            <td>
              <button class="action-btn" ${dis} data-action="edit" data-id="${r.id}">✏️ 수정</button>
              <button class="action-btn" data-action="history" data-id="${r.id}">📜 이력</button>
              <button class="action-btn" ${dis} data-action="approve" data-id="${r.id}" style="color:#16a34a;">승인</button>
              <button class="action-btn" ${dis} data-action="reject" data-id="${r.id}" style="color:#dc2626;">반려</button>
            </td>
          </tr>`;
            }).join('');
            el('receiptList').innerHTML = html || '<tr><td colspan="6">데이터가 없습니다.</td></tr>';
        } catch (e) {
            console.error('영수증 목록 불러오기 실패:', e);
            el('receiptList').innerHTML = '<tr><td colspan="6" style="color:#dc2626;">데이터 불러오기 실패</td></tr>';
        }
    }

    async function showHistory(id) {
        try {
            const res = await fetch(`/api/receipts/${id}/history`);
            if (!res.ok) throw new Error('이력 불러오기 실패');

            const logs = await res.json();

            if (!logs || logs.length === 0) {
                el('historyContent').innerHTML = '<div class="history-empty">📭 아직 변경 이력이 없습니다.</div>';
            } else {
                const content = logs.map(l => {
                    const rawTime = l.createdAt || l.created_at; // 혹시 모를 이름 차이 대비
                    const createdAt = rawTime ? String(rawTime).replace('T', ' ').substring(0, 16) : '시간 정보 없음';
                    return `
                        <div class="history-item">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <strong style="color:#334155;">${escapeHtml(l.oldStatus)} ➜ ${escapeHtml(l.newStatus)}</strong>
                                <span style="color:#94a3b8; font-size:0.75rem;">${escapeHtml(createdAt)}</span>
                            </div>
                            ${l.reason ? `
                                <div class="history-reason">
                                    <strong>📝 사유:</strong> ${escapeHtml(l.reason)}
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('');
                el('historyContent').innerHTML = content;
            }

            openModal('historyModal');
        } catch (e) {
            console.error('이력 불러오기 오류:', e);
            el('historyContent').innerHTML = '<div class="history-empty" style="color:#dc2626;">⚠️ 이력을 불러올 수 없습니다.</div>';
            openModal('historyModal');
        }
    }

    async function updateStatus(id, status) {
        let reason = "관리자 요청";
        if (status === 'REJECTED') {
            const input = prompt("반려 사유를 입력하세요:");
            if (input === null) return;
            reason = input || "사유 미입력";
        }

        try {
            const res = await fetch(`/api/receipts/${id}/status?status=${status}&reason=${encodeURIComponent(reason)}`, {
                method: 'PATCH'
            });
            if (!res.ok) throw new Error('상태 업데이트 실패');
            await fetchReceipts();
        } catch (e) {
            console.error('상태 업데이트 오류:', e);
            alert('상태 업데이트에 실패했습니다.');
        }
    }

    async function openEditModalById(id) {
        const r = receiptData.find(x => Number(x.id) === Number(id));
        if (!r) {
            alert('영수증 정보를 찾을 수 없습니다.');
            return;
        }

        el('editId').value = r.id;
        el('editStoreName').value = r.storeName ?? '';
        el('editAmount').value = r.totalAmount ?? 0;

        // 영수증 이미지 표시
        const preview = el('receiptPreview');
        if (r.filePath) {
            const imageSrc = `/images/${r.filePath}`; // 백엔드가 주는 파일명 그대로 사용
            preview.innerHTML = `<img src="${escapeHtml(imageSrc)}" alt="영수증 이미지" onerror="this.parentElement.innerHTML='<div class=\\'receipt-preview-placeholder\\'>이미지를 찾을 수 없습니다</div>'">`;
        } else {
            // filePath가 없는 경우 플레이스홀더 표시
            preview.innerHTML = '<div class="receipt-preview-placeholder">영수증 이미지가 없습니다</div>';
        }

        openModal('editModal');
    }

    async function submitEdit() {
        const id = el('editId').value;
        const storeName = el('editStoreName').value;
        const totalAmount = Number(el('editAmount').value);

        if (!storeName.trim()) {
            alert('상호명을 입력하세요.');
            return;
        }

        if (totalAmount < 0) {
            alert('금액은 0 이상이어야 합니다.');
            return;
        }

        try {
            const body = { storeName, totalAmount };
            const res = await fetch(`/api/receipts/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (!res.ok) throw new Error('수정 실패');

            closeModal('editModal');
            await fetchReceipts();
        } catch (e) {
            console.error('수정 오류:', e);
            alert('수정에 실패했습니다.');
        }
    }

    async function uploadReceipts() {
        const files = el('fileInput').files;
        if (!files.length) return alert("파일을 선택하세요!");

        el('progCont').style.display = 'block';
        el('uploadBtn').disabled = true;

        try {
            for (let i = 0; i < files.length; i++) {
                const formData = new FormData();
                formData.append('file', files[i]);
                formData.append('workspaceId', '1');
                formData.append('userId', '1');

                await fetch('/api/receipts/upload', {
                    method: 'POST',
                    headers: { 'X-IDEMPOTENCY-KEY': `key-${Date.now()}-${i}` },
                    body: formData
                });

                el('progBar').style.width = Math.round(((i + 1) / files.length) * 100) + '%';
            }

            el('fileInput').value = '';
            el('thumbs').style.display = 'none';
            el('thumbs').innerHTML = '';
            el('progBar').style.width = '0%';

            setTimeout(() => {
                el('progCont').style.display = 'none';
            }, 1000);

            await fetchReceipts();
        } catch (e) {
            console.error('업로드 오류:', e);
            alert('업로드에 실패했습니다.');
        } finally {
            el('uploadBtn').disabled = false;
        }
    }

    el('receiptList').addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn || btn.disabled) return;
        const { action, id } = btn.dataset;
        if (action === 'edit') openEditModalById(id);
        if (action === 'history') showHistory(id);
        if (action === 'approve') updateStatus(id, 'APPROVED');
        if (action === 'reject') updateStatus(id, 'REJECTED');
    });

    el('dropZone').addEventListener('click', () => el('fileInput').click());
    el('fileInput').addEventListener('change', (e) => {
        const wrap = el('thumbs');
        wrap.innerHTML = '';
        wrap.style.display = 'grid';

        Array.from(e.target.files).forEach(f => {
            const img = document.createElement('img');
            img.className = 'thumb';
            img.src = URL.createObjectURL(f);
            img.onload = () => URL.revokeObjectURL(img.src);
            wrap.appendChild(img);
        });
    });

    el('closeEditBtn').onclick = () => closeModal('editModal');
    el('closeHistoryBtn').onclick = () => closeModal('historyModal');
    el('saveEditBtn').onclick = submitEdit;
    el('uploadBtn').onclick = uploadReceipts;
    el('refreshBtn').onclick = fetchReceipts;

    window.onload = fetchReceipts;
</script>
</body>
</html>
